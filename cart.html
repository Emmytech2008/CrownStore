<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart Page</title>
<link rel="stylesheet" href="online.css">
</head>

<body>
      <header>
        <div class="crownhead">
        <img src="images/crownlogo.png" alt="">
        <h1>CrownCart Store</h1>
        </div>
        <nav>
            <ul>
                <a href="index.html"><li>Home</li></a>
                <a href="product.html"><li>Product</li></a>
                <a href="about.html"><li>About</li></a>
                <a href="cart.html"><li>Cart</li></a>
            </ul>
        </nav>
        <input type="search" placeholder="search" class="search">
        <button class="sign" onclick="window.location.href='signin.html'">Sign In</button>
<button class="sign" onclick="window.location.href='signup.html'">Sign Up</button>
        <div class="cart-icon" onclick="goToCart()">
    🛒 <span id="cart-count">0</span>
</div>
<button class="hamburger" onclick="this.closest('header').querySelector('nav').classList.toggle('open')">
  <span></span>
  <span></span>
  <span></span>
</button>
    </header>

<div class="container">

    <!-- CART ITEMS -->
   <div class="cart" id="cart"></div>



    <!-- SUMMARY -->
    <div class="summary">
        <h3>Order Summary</h3>
        <p><span>Subtotal</span> <span id="subtotal">₦0</span></p>
        <p><span>Delivery</span> <span>₦2,000</span></p>
        <p class="total"><span>Total</span> <span id="total">₦0</span></p>

      <button class="checkout" onclick="checkoutWhatsApp()">
    🔒 Order via WhatsApp
</button>

<!-- Show this message to guests -->
<p id="login-notice" style="
    color: #E63946; 
    font-size: 13px; 
    text-align: center; 
    margin-top: 10px;
    display: none;">
    You must <a href="signin.html" style="color:#F5A623;">sign in</a> to place an order.
</p>


    </div>

</div>


 <div class="lastdiv">
            <h1>Get Up To 50% CashBack <br>On Your First Purchase </h1>
        </div>

<script>
        // Show notice if guest
    if (!JSON.parse(localStorage.getItem("loggedInUser"))) {
        document.getElementById("login-notice").style.display = "block";
    }
// ===== CART KEY =====
const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
const cartKey = loggedInUser ? "cart_" + loggedInUser.email : "cart_guest";

// ===== LOAD CART =====
function loadCart() {
    let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
    let cartBox = document.getElementById("cart");
    cartBox.innerHTML = "";

    if (cart.length === 0) {
        cartBox.innerHTML = "<h3>Your cart is empty 🛒</h3>";
        document.getElementById("subtotal").innerText = "₦0";
        document.getElementById("total").innerText = "₦0";
        return;
    }

    let subtotal = 0;
    cart.forEach((item, index) => {
        subtotal += item.price * item.quantity;
        cartBox.innerHTML += `
        <div class="cart-item">
            <img src="${item.image}">
            <div class="info">
                <h4>${item.name}</h4>
                <p class="price">₦${item.price.toLocaleString()}</p>
                <div class="qty">
                    <button onclick="changeQty(${index}, -1)">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="changeQty(${index}, 1)">+</button>
                </div>
                <p class="remove" onclick="removeItem(${index})">Remove</p>
            </div>
        </div>`;
    });

    document.getElementById("subtotal").innerText = "₦" + subtotal.toLocaleString();
    document.getElementById("total").innerText = "₦" + (subtotal + 2000).toLocaleString();
}

// ===== CHANGE QUANTITY =====
function changeQty(index, change) {
    let cart = JSON.parse(localStorage.getItem(cartKey));
    cart[index].quantity += change;
    if (cart[index].quantity <= 0) cart.splice(index, 1);
    localStorage.setItem(cartKey, JSON.stringify(cart));
    loadCart();
    updateCartCount();
}

// ===== REMOVE ITEM =====
function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem(cartKey));
    cart.splice(index, 1);
    localStorage.setItem(cartKey, JSON.stringify(cart));
    loadCart();
    updateCartCount();
}

// ===== CART COUNT =====
function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
    let totalItems = 0;
    cart.forEach(item => totalItems += item.quantity);
    document.getElementById("cart-count").innerText = totalItems;
}

function goToCart() {
    window.location.href = "cart.html";
}

// ===== WHATSAPP CHECKOUT =====
function checkoutWhatsApp() {
    // Block if not logged in
    if (!loggedInUser) {
        alert("Please sign in to place an order.");
        localStorage.setItem("redirectAfterLogin", window.location.href);
        window.location.href = "signin.html";
        return;
    }

    let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
    if (cart.length === 0) { alert("Your cart is empty"); return; }

    let message = "Hello, I want to order:%0A%0A";
    let total = 0;
    cart.forEach(item => {
        message += `${item.name} - ₦${item.price} x ${item.quantity}%0A`;
        total += item.price * item.quantity;
    });
    message += `%0ATotal: ₦${total.toLocaleString()}`;
    window.open(`https://wa.me/2347078709384?text=${message}`, "_blank");
}

// ===== LOGOUT =====
function logout() {
    localStorage.removeItem("loggedInUser");
    location.reload();
}

// ===== HEADER GREETING =====
if (loggedInUser) {
    document.querySelectorAll(".sign").forEach(btn => btn.style.display = "none");
    const header = document.querySelector("header");
    const greeting = document.createElement("span");
    greeting.style.cssText = "color:#F5A623; font-weight:bold; font-size:14px;";
    greeting.innerHTML = `👤 ${loggedInUser.name} | <a href="#" onclick="logout()" style="color:#E63946;">Logout</a>`;
    header.appendChild(greeting);
}

// ===== RUN ON LOAD =====
loadCart();
updateCartCount();
</script>
</body>
</html>
